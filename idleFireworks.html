<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idle Screen – Fireworks</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      margin: 0;
      background-color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      position: relative;
    }
    canvas {
      border: 2px solid #444;
      background-color: #11002b;
    }
    .firework-buttons {
      display: flex;
      gap: 10px;
    }
    .firework-buttons button {
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<script src="js/navigation.js"></script>
<script src="js/fullscreen.js"></script>
<script>
  loadNavigation();
</script>

<div class="container">
  <canvas id="fireworksCanvas" width="1000" height="500"></canvas>

  <div class="firework-buttons">
    <button onclick="launchFirework('standard')">Standard</button>
    <button onclick="launchFirework('big')">Big</button>
    <button onclick="launchFirework('spark')">Spark</button>
    <button onclick="launchFirework('white')">White Flash</button>
    <button onclick="launchFirework('random')">Random</button>
  </div>
  <button id="fullscreenBtn">Fullscreen</button>
</div>


<script src="js/idle-fireworks.js"></script>

</body>
</html>
