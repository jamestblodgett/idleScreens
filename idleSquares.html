<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idle Screen</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      margin: 0;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    canvas {
      border: 2px solid #000;
      background-color: #fff;
    }
    button {
      padding: 6px 12px;
      font-size: 14px;
    }
    #canvasResizeHandle {
      width: 15px;
      height: 15px;
      background: #333;
      position: absolute;
      cursor: se-resize;
    }
  </style>
</head>
<body>

  <script src="js/navigation.js"></script>
  <script src="js/fullscreen.js"></script>
  <script>loadNavigation();</script>

  <div class="container">

    <canvas id="idleCanvas" width="1000" height="500"></canvas>
    <div id="canvasResizeHandle"></div>

    <button id="addSquareBtn">Add Square</button>
    <button id="removeSquareBtn">Remove Square</button>
    <p id="squareCount">Squares: 0</p>

    <!-- MOVED INSIDE THE CONTAINER -->
    <button id="fullscreenBtn">Fullscreen</button>

  </div>

  <script src="js/idle-squares.js"></script>
</body>
</html>
